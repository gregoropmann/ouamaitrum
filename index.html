<!DOCTYPE html>
<html lang="et">
<head>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Amaitrum</h1>
    <nav>

        <a href="#contact">Kontakt</a>

</header>

<section id="home" class="hero">

    <p></p>

<section id="about" class="section">

<section id="gallery" class="section">

        <img src="images/">

    <div class="card">

        <input type="text" placeholder="Sinu nimi" required>
        <input type="email" placeholder="Sinu e-post" required>
